<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registration!</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-dark">
    <main>
      <div class="container">
        <div class="row justify-content-center mt-4">
          <div class="col-12 col-md-6">
            <div class="d-flex justify-content-end">
            <h2 id="counter" class="text-light"></h2>
            </div>
            <form>
              <h2 class="text-center text-light">Registration Form :&#41;</h2>
              <div class="mb-3">
                <h2 class="text-light">Previous name</h2>
              </div>
              <h3 class="text-light mt-4" id="inputName"></h3>
              <section>
                <div class="input-group">
                  <span class="input-group-text">Write Your Name</span>
                  <textarea
                    class="form-control"
                    rows="1"
                    aria-label="With textarea"
                    id="content"
                  ></textarea>
                </div>
                <div class="d-flex justify-content-around mt-4">
                  <button
                    type="button"
                    class="btn btn-success"
                    onclick="save()"
                  >
                    Save
                  </button>
                  <button
                    type="button"
                    class="btn btn-danger"
                    onclick="remove()"
                  >
                    Clear
                  </button>
                </div>
              </section>
            </form>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
